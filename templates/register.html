{% extends 'base.html' %}

{% block title %}Sign Up - Smart FAQ Assistant{% endblock %}

{% block content %}
<div class="flex-1 flex flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-gradient-to-b from-[#f8fafc] to-[#f1f5f9] dark:from-[#090d16] dark:to-[#0f172a]">
    
    <!-- Background Blur Decorative Blobs -->
    <div class="absolute bottom-1/4 right-1/3 w-80 h-80 bg-brand-500/10 rounded-full blur-3xl -z-10 animate-float"></div>

    <div class="max-w-md w-full space-y-8 z-10">
        <div class="text-center">
            <h2 class="font-outfit font-extrabold text-3xl text-slate-900 dark:text-white">Create Account</h2>
            <p class="mt-2.5 text-sm text-slate-500 dark:text-slate-400">
                Register to get started with your customized NLP chatbot.
            </p>
        </div>

        <div class="glass-card p-8 rounded-2xl shadow-xl border border-white/20 dark:border-slate-800/60 bg-white/40 dark:bg-[#0c1220]/40">
            <form class="space-y-5" action="{{ url_for('auth.register') }}" method="POST">
                
                <div>
                    <label for="username" class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Username</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400">
                            <i class="fa-solid fa-user-tag text-sm"></i>
                        </span>
                        <input id="username" name="username" type="text" required class="w-full pl-10 pr-4 py-2.5 rounded-xl bg-white dark:bg-[#090d16] border border-slate-200/80 dark:border-slate-800/80 focus:border-brand-500 focus:ring-1 focus:ring-brand-500 text-sm text-slate-850 dark:text-slate-150 transition-all placeholder:text-slate-400/80" placeholder="johndoe">
                    </div>
                </div>

                <div>
                    <label for="email" class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Email Address</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400">
                            <i class="fa-solid fa-envelope text-sm"></i>
                        </span>
                        <input id="email" name="email" type="email" required class="w-full pl-10 pr-4 py-2.5 rounded-xl bg-white dark:bg-[#090d16] border border-slate-200/80 dark:border-slate-800/80 focus:border-brand-500 focus:ring-1 focus:ring-brand-500 text-sm text-slate-850 dark:text-slate-150 transition-all placeholder:text-slate-400/80" placeholder="john@example.com">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400">
                            <i class="fa-solid fa-lock text-sm"></i>
                        </span>
                        <input id="password" name="password" type="password" required class="w-full pl-10 pr-4 py-2.5 rounded-xl bg-white dark:bg-[#090d16] border border-slate-200/80 dark:border-slate-800/80 focus:border-brand-500 focus:ring-1 focus:ring-brand-500 text-sm text-slate-850 dark:text-slate-150 transition-all placeholder:text-slate-400/80" placeholder="Min. 6 characters">
                    </div>
                </div>

                <div>
                    <label for="confirm_password" class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Confirm Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400">
                            <i class="fa-solid fa-circle-check text-sm"></i>
                        </span>
                        <input id="confirm_password" name="confirm_password" type="password" required class="w-full pl-10 pr-4 py-2.5 rounded-xl bg-white dark:bg-[#090d16] border border-slate-200/80 dark:border-slate-800/80 focus:border-brand-500 focus:ring-1 focus:ring-brand-500 text-sm text-slate-850 dark:text-slate-150 transition-all placeholder:text-slate-400/80" placeholder="Confirm your password">
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl bg-brand-600 hover:bg-brand-700 text-white font-semibold shadow-lg shadow-brand-500/10 hover:shadow-brand-500/25 transition-all duration-300 transform active:scale-98">
                        Sign Up
                    </button>
                </div>
            </form>

            <div class="mt-6 text-center">
                <span class="text-xs font-medium text-slate-500 dark:text-slate-400">Already have an account?</span>
                <a href="{{ url_for('auth.login') }}" class="ml-1 text-xs font-bold text-brand-600 dark:text-brand-400 hover:underline">Sign in</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
